<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SevenCheck - 7번의 질문으로 찾는 나의 본모습</title>
    <meta name="description" content="심리학적 기반과 감성적 분석을 결합한 7단계 테스트. 성격, 비주얼, 운세 등 당신이 궁금한 모든 것을 SevenCheck에서 확인하세요.">
    <meta name="keywords" content="심리테스트, 성격테스트, MBTI, 운세, 미니게임, 웹게임, 포인트">
    <link rel="canonical" href="https://sunofox-test.pages.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="SevenCheck - 전문적인 7단계 심리 분석">
    <meta property="og:description" content="딱 7번의 선택으로 당신의 잠재력을 확인해보세요. 친구와 함께 즐기는 미니게임도 준비되어 있습니다.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="nav-top">
                <a href="#home" class="logo"><span>7</span>Check</a>
                <div class="nav-right">
                    <button id="notification-btn" class="theme-toggle" style="position:relative; display:none;" title="알림">
                        🔔
                        <span id="notif-badge" class="notif-badge hidden">0</span>
                    </button>
                    <div id="header-profile" class="header-profile hidden" onclick="location.hash='#profile'">
                        <span id="user-emoji" class="h-emoji">👤</span>
                        <span id="user-name" class="h-name">닉네임</span>
                        <div class="h-points">
                            <span id="user-points">0</span>
                            <span style="font-size: 0.7rem; font-weight: 800; margin-left: 1px;">P</span>
                        </div>
                    </div>
                    <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">✨</button>
                    <button id="share-site-btn" class="theme-toggle" title="사이트 공유">🔗</button>
                </div>
            </div>
            <nav class="nav-tabs">
                <div class="nav-dropdown">
                    <button class="nav-dropbtn">✨ 7Check</button>
                    <div class="dropdown-content">
                        <a href="#personality" class="nav-link" data-filter="성격">🧠 성격 분석</a>
                        <a href="#face" class="nav-link" data-filter="얼굴">✨ 비주얼</a>
                        <a href="#fortune" class="nav-link" data-filter="사주">🔮 오늘의 운세</a>
                        <a href="#fun" class="nav-link" data-filter="재미">🎨 재미/심리</a>
                    </div>
                </div>
                <a href="#board" class="nav-link" data-filter="게시판">게시판</a>
                <a href="#arcade" class="nav-link" data-filter="오락실">오락실</a>
                <a href="#profile" class="nav-link" data-filter="프로필">프로필</a>
            </nav>
        </div>
    </header>

    <main id="app">
        <!-- 콘텐츠 주입 -->
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <h3>SevenCheck Studio</h3>
                <p>7번의 질문으로 끝내는 모든 확인. 당신의 일상에 즐거움을 더합니다.</p>
            </div>
            <div class="footer-links">
                <a href="#guide">이용 가이드</a> | 
                <a href="#privacy">개인정보처리방침</a> | 
                <a href="#terms">이용약관</a> | 
                <a href="#contact">문의하기</a>
                <span id="footer-admin-link" class="hidden"> | <a href="#admin" style="color:var(--accent-color); font-weight:800;">🛡️ 관리자 콘솔</a></span>
            </div>
        </div>
        <p class="copyright">&copy; 2026 SevenCheck Studio. All rights reserved.</p>
    </footer>

    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
