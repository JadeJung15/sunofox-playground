<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SevenCheck</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="심리테스트 선택, 진행, 결과만 남긴 SevenCheck 테스트 앱">
    <meta name="keywords" content="심리테스트, 성격테스트, 재미테스트, 연애테스트">
    <link rel="canonical" href="https://7checkfox.com/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://7checkfox.com/">
    <meta property="og:title" content="SevenCheck">
    <meta property="og:description" content="테스트 선택, 진행, 결과만 남긴 심리테스트 앱">
    <meta property="og:image" content="https://7checkfox.com/%EC%88%98%EB%85%B8%ED%8F%AD%EC%8A%A4%20%EB%A1%9C%EA%B3%A0.png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/css/style.css?v=8.6.0">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="site-header__inner">
                <a href="#home" class="brand">
                    <img src="/수노폭스%20로고.png" alt="SunoFox" class="brand__logo">
                    <div class="brand__copy">
                        <strong>SevenCheck</strong>
                        <span>Test only</span>
                    </div>
                </a>

                <nav class="top-nav" aria-label="주요 테스트 카테고리">
                    <a href="#home" class="top-nav__link is-active" data-route="#home">전체</a>
                    <a href="#personality" class="top-nav__link" data-route="#personality">성격</a>
                    <a href="#face" class="top-nav__link" data-route="#face">얼굴</a>
                    <a href="#fortune" class="top-nav__link" data-route="#fortune">사주</a>
                    <a href="#fun" class="top-nav__link" data-route="#fun">재미</a>
                    <a href="#salary" class="top-nav__link" data-route="#salary">월급 루팡</a>
                </nav>

                <div class="header-account">
                    <button id="login-btn" class="button button--primary">로그인</button>
                    <button id="header-profile" class="profile-pill hidden" onclick="location.hash='#home'">
                        <span id="user-emoji">👤</span>
                        <span id="user-name">닉네임</span>
                        <span class="profile-pill__points"><span id="user-points">0</span>P</span>
                    </button>
                </div>
            </div>
        </header>

        <main id="app"></main>

        <footer class="site-footer">
            <div class="site-footer__inner">
                <p>심리테스트 선택 → 진행 → 결과</p>
                <div id="visitor-stats" class="site-stats">
                    TODAY <span id="today-visitors">0</span>
                    TOTAL <span id="total-visitors">0</span>
                </div>
                <span id="footer-admin-link" class="hidden"></span>
            </div>
        </footer>
    </div>

    <script src="/js/site-config.js?v=8.6.0"></script>
    <script type="module" src="/js/firebase-init.js?v=8.6.0"></script>
    <script type="module" src="/js/sound.js?v=8.6.0"></script>
    <script type="module" src="/js/app.js?v=8.6.0"></script>
</body>
</html>
