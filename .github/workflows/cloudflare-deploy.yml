name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check Secrets (Debug)
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ]; then echo "CF_API_TOKEN is MISSING"; else echo "CF_API_TOKEN is present"; fi
          if [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then echo "CF_ACCOUNT_ID is MISSING"; else echo "CF_ACCOUNT_ID is present"; fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: sunofox-playground
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
