name: Deploy Development to Cloudflare Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: npm test

      - name: Firestore rules tests
        run: npm run test:rules

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: development
    concurrency:
      group: cloudflare-pages-development
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build
        run: |
          mkdir -p dist
          cp -r index.html privacy.html daily css js *.png sitemap.xml robots.txt ads.txt dist/ 2>/dev/null || true

      - name: Deploy to Development Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: sunofox-playground-test
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
