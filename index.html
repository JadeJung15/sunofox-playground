<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunoFox Playground - 미니게임 & 커뮤니티</title>
    <meta name="description" content="가벼운 미니게임과 커뮤니티가 있는 놀이터입니다.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Flash prevention */
        html { visibility: hidden; opacity: 0; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="#home" class="logo">SunoFox</a>
            <nav class="nav-tabs">
                <a href="#home" class="nav-link">🏠 홈</a>
                <a href="#games" class="nav-link">🕹️ 게임</a>
                <a href="#lounge" class="nav-link">💬 라운지</a>
                <a href="#community" class="nav-link">📝 커뮤니티</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                <span class="icon">🌙</span>
            </button>
        </div>
    </header>

    <main id="app">
        <!-- Content will be injected here by app.js -->
        <div style="text-align:center; padding: 2rem;">로딩중...</div>
    </main>

    <footer style="text-align:center; padding: 2rem; color: var(--text-sub); font-size: 0.8rem;">
        &copy; 2026 SunoFox Playground. All rights reserved.
    </footer>

    <script>
        // Prevent flash of unstyled content
        document.addEventListener("DOMContentLoaded", () => {
            document.documentElement.style.visibility = "visible";
            document.documentElement.style.opacity = "1";
        });
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
