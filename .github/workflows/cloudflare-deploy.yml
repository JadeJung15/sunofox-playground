name: Deploy Production to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "배포할 Git ref"
        required: true
        default: "main"

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: npm test

      - name: Firestore rules tests
        run: npm run test:rules

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: cloudflare-pages-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Build
        run: |
          mkdir -p dist
          cp -r index.html privacy.html daily css js *.png sitemap.xml robots.txt ads.txt dist/ 2>/dev/null || true

      - name: Deploy to Production Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: sunofox-playground
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
